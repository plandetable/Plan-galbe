<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Mon Coach · Phase Galbe 🍑</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#0f0a08;
  --bg2:#1a1008;

  --card:#1e1410;
  --card2:#251a14;

  --border:#3a2820;

  --text:#f0e8e0;
  --muted:#8a7060;

  --rose:#e8806a;
  --rose-light:rgba(232,128,106,0.12);

  --gold:#d4a840;
  --gold-light:rgba(212,168,64,0.12);

  --green:#7ab87a;
  --green-light:rgba(122,184,122,0.12);

  --blue:#6a9abf;
  --blue-light:rgba(106,154,191,0.12);

  --shadow:0 10px 30px rgba(0,0,0,0.35);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html{
  scroll-behavior:smooth;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Jost',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
  padding-bottom:100px;
}

/*══════════════════════════════
HEADER
══════════════════════════════*/

.header{
  position:sticky;
  top:0;
  z-index:200;

  background:rgba(30,20,16,0.9);
  backdrop-filter:blur(10px);

  border-bottom:1px solid var(--border);

  padding:16px 20px;

  display:flex;
  align-items:center;
  justify-content:space-between;
}

.header-left h1{
  font-family:'Cormorant Garamond',serif;
  font-size:24px;
  font-weight:600;
}

.header-left h1 em{
  color:var(--rose);
  font-style:italic;
}

.header-left p{
  font-size:11px;
  color:var(--muted);
  margin-top:2px;
}

/*══════════════════════════════
PAGES
══════════════════════════════*/

.page{
  display:none;
}

.page.active{
  display:block;
}

/*══════════════════════════════
BOTTOM NAV
══════════════════════════════*/

.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;

  z-index:200;

  background:rgba(30,20,16,0.95);
  backdrop-filter:blur(14px);

  border-top:1px solid var(--border);

  display:flex;

  padding-bottom:env(safe-area-inset-bottom);
}

.nav-item{
  flex:1;
  text-align:center;
  padding:12px 4px 10px;
  cursor:pointer;
  transition:0.2s;
}

.nav-icon{
  display:block;
  font-size:22px;
  margin-bottom:3px;
}

.nav-label{
  font-size:10px;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:1px;
  font-weight:600;
}

.nav-item.active .nav-label{
  color:var(--rose);
}

.nav-item.active .nav-icon{
  transform:translateY(-2px);
}

/*══════════════════════════════
TODAY BANNER
══════════════════════════════*/

.today-banner{
  margin:16px;

  padding:22px;

  border-radius:22px;

  background:linear-gradient(135deg,var(--rose),#c15d4f);

  display:flex;
  justify-content:space-between;
  align-items:center;

  box-shadow:var(--shadow);
}

.today-banner-left h2{
  font-family:'Cormorant Garamond',serif;
  font-size:30px;
  font-style:italic;
}

.today-banner-left p{
  font-size:12px;
  margin-top:4px;
  opacity:0.85;
}

.today-banner-right{
  text-align:right;
}

.kcal{
  font-size:34px;
  font-weight:700;
}

.kcal-label{
  font-size:10px;
  opacity:0.7;
  letter-spacing:1px;
  text-transform:uppercase;
}

/*══════════════════════════════
SECTION
══════════════════════════════*/

.section-title{
  display:flex;
  align-items:center;
  gap:10px;

  padding:0 20px;

  margin:24px 0 14px;
}

.section-title h3{
  font-family:'Cormorant Garamond',serif;
  font-size:22px;
  font-weight:600;
}

.section-title h3 em{
  color:var(--rose);
  font-style:italic;
}

.section-line{
  flex:1;
  height:1px;
  background:var(--border);
}

/*══════════════════════════════
DAY SELECTOR
══════════════════════════════*/

.day-selector{
  display:flex;
  gap:10px;

  overflow-x:auto;
  scrollbar-width:none;

  padding:0 16px;
  margin-bottom:18px;
}

.day-selector::-webkit-scrollbar{
  display:none;
}

.day-btn{
  min-width:62px;

  background:var(--card);

  border:1px solid var(--border);

  border-radius:14px;

  padding:12px 14px;

  text-align:center;

  flex-shrink:0;

  cursor:pointer;

  transition:0.2s;
}

.day-btn.active{
  background:var(--rose);
  border-color:var(--rose);
}

.day-btn.active .day-short,
.day-btn.active .day-num{
  color:white;
}

.day-short{
  font-size:11px;
  color:var(--muted);
  letter-spacing:1px;
  text-transform:uppercase;
}

.day-num{
  font-family:'Cormorant Garamond',serif;
  font-size:24px;
  font-weight:700;
  margin-top:2px;
}

/*══════════════════════════════
MEALS
══════════════════════════════*/

.meal-card{
  background:var(--card);

  border:1px solid var(--border);

  border-radius:18px;

  margin:0 16px 12px;

  overflow:hidden;
}

.meal-card-header{
  display:flex;
  align-items:center;
  gap:12px;

  padding:16px;

  cursor:pointer;
}

.meal-icon{
  font-size:22px;
}

.meal-title-wrap{
  flex:1;
}

.meal-name{
  font-size:14px;
  font-weight:500;
}

.meal-recipe-name{
  color:var(--rose);

  font-size:16px;

  font-family:'Cormorant Garamond',serif;
  font-style:italic;
}

.meal-badges{
  display:flex;
  gap:6px;
}

.badge{
  border-radius:999px;
  padding:4px 9px;
  font-size:11px;
  font-weight:700;
}

.badge-k{
  background:var(--gold-light);
  color:var(--gold);
}

.badge-p{
  background:var(--green-light);
  color:var(--green);
}

.meal-toggle{
  color:var(--muted);
  transition:0.2s;
}

.meal-toggle.open{
  transform:rotate(180deg);
}

.meal-body{
  display:none;
  padding:0 16px 16px;
}

.meal-body.open{
  display:block;
}

.meal-divider{
  height:1px;
  background:var(--border);
  margin-bottom:14px;
}

.meal-item{
  display:flex;
  gap:8px;

  margin-bottom:8px;

  font-size:13px;
  color:var(--muted);
}

.meal-item::before{
  content:'';
  width:5px;
  height:5px;
  border-radius:50%;
  background:var(--rose);

  flex-shrink:0;
  margin-top:7px;
}

.meal-item strong{
  color:var(--text);
}

.meal-tip{
  margin-top:12px;

  padding:10px 12px;

  border-radius:12px;

  background:var(--rose-light);

  color:var(--rose);

  font-size:12px;
}

/*══════════════════════════════
SPORT CARD
══════════════════════════════*/

.sport-day-card{
  background:var(--card);

  border:1px solid var(--border);

  border-radius:18px;

  margin:0 16px 14px;

  overflow:hidden;
}

.sport-day-header{
  padding:16px;

  display:flex;
  align-items:center;
  gap:12px;

  cursor:pointer;
}

.sport-day-icon{
  font-size:30px;
}

.sport-day-info{
  flex:1;
}

.sport-day-name{
  font-family:'Cormorant Garamond',serif;
  font-size:22px;
}

.sport-day-name em{
  color:var(--rose);
  font-style:italic;
}

.sport-day-sub{
  font-size:12px;
  color:var(--muted);
  margin-top:2px;
}

.sport-day-toggle{
  color:var(--muted);
  transition:0.2s;
}

.sport-day-toggle.open{
  transform:rotate(180deg);
}

.sport-day-body{
  display:none;
  padding:0 16px 16px;
}

.sport-day-body.open{
  display:block;
}

/*══════════════════════════════
EXERCISES
══════════════════════════════*/

.exercise{
  background:var(--card2);

  border:1px solid var(--border);

  border-radius:14px;

  padding:14px;

  margin-bottom:10px;
}

.exercise-header{
  display:flex;
  justify-content:space-between;
  gap:10px;
}

.exercise-num{
  font-size:10px;
  color:var(--muted);
  letter-spacing:1px;
  text-transform:uppercase;
}

.exercise-name{
  font-size:16px;
  font-weight:600;
  margin-top:3px;
}

.exercise-sets{
  background:var(--rose-light);
  color:var(--rose);

  padding:6px 10px;

  border-radius:10px;

  font-size:13px;
  font-weight:700;

  white-space:nowrap;
}

.exercise-charge{
  color:var(--gold);
  font-size:12px;
  margin:10px 0;
}

.exercise-tip{
  display:flex;
  gap:6px;

  font-size:12px;
  color:var(--muted);

  margin-bottom:4px;
}

.exercise-tip::before{
  content:'♡';
  color:var(--rose);
}

/*══════════════════════════════
REST TIMER BUTTON
══════════════════════════════*/

.rest-tag{
  display:inline-flex;
  align-items:center;
  gap:6px;

  margin-top:10px;

  padding:6px 10px;

  border-radius:8px;

  background:var(--bg2);

  border:1px solid var(--border);

  font-size:11px;
  color:var(--muted);

  cursor:pointer;

  transition:0.2s;
}

.rest-tag:hover{
  background:var(--rose-light);
  color:var(--rose);
}

/*══════════════════════════════
TIMER
══════════════════════════════*/

.timer-overlay{
  position:fixed;
  inset:0;

  z-index:500;

  background:rgba(0,0,0,0.9);

  display:none;

  align-items:center;
  justify-content:center;
  flex-direction:column;
}

.timer-overlay.open{
  display:flex;
}

.timer-circle{
  width:220px;
  height:220px;

  border-radius:50%;

  border:4px solid var(--border);

  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;

  background:var(--card);

  margin-bottom:30px;
}

.timer-num{
  font-family:'Cormorant Garamond',serif;
  font-size:64px;
}

.timer-label{
  font-size:11px;
  letter-spacing:1px;
  color:var(--muted);
  text-transform:uppercase;
}

.timer-title{
  font-family:'Cormorant Garamond',serif;
  font-size:28px;
  color:var(--rose);
  margin-bottom:10px;
}

.timer-sub{
  color:var(--muted);
  margin-bottom:28px;
}

.timer-btn{
  border:none;

  background:var(--rose);
  color:white;

  padding:14px 40px;

  border-radius:14px;

  font-size:15px;
  font-weight:700;

  cursor:pointer;
}

.timer-skip{
  margin-top:16px;
  color:var(--muted);
  cursor:pointer;
}

/*══════════════════════════════
CHECK EXERCISES
══════════════════════════════*/

.exercise-check{
  margin-top:12px;

  display:flex;
  align-items:center;
  gap:10px;

  cursor:pointer;

  font-size:12px;
  color:var(--muted);
}

.exercise-check-box{
  width:22px;
  height:22px;

  border-radius:7px;

  border:2px solid var(--border);

  display:flex;
  align-items:center;
  justify-content:center;

  transition:0.2s;
}

.exercise-check.done .exercise-check-box{
  background:var(--green);
  border-color:var(--green);
}

.exercise-check.done .exercise-check-box::after{
  content:'✓';
  color:white;
  font-weight:700;
}

/*══════════════════════════════
PROGRESS
══════════════════════════════*/

.progress-card{
  background:var(--card);

  border:1px solid var(--border);

  border-radius:18px;

  margin:0 16px 18px;

  padding:16px;
}

.progress-top{
  display:flex;
  justify-content:space-between;
  margin-bottom:12px;
}

.progress-label{
  font-size:13px;
}

.progress-percent{
  color:var(--rose);
  font-weight:700;
}

.progress-bar{
  width:100%;
  height:10px;

  background:var(--card2);

  border-radius:999px;

  overflow:hidden;
}

.progress-fill{
  height:100%;
  background:linear-gradient(90deg,var(--rose),#ffb199);
  border-radius:999px;

  transition:0.3s;
}

/*══════════════════════════════
PERF
══════════════════════════════*/

.perf-header{
  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:20px;
}

.perf-header h2{
  font-family:'Cormorant Garamond',serif;
  font-size:28px;
}

.perf-header h2 em{
  color:var(--rose);
}

.add-btn{
  border:none;

  background:var(--rose);
  color:white;

  padding:10px 16px;

  border-radius:12px;

  font-weight:700;

  cursor:pointer;
}

/*══════════════════════════════
UTILITY
══════════════════════════════*/

.hidden{
  display:none !important;
}

</style>
</head>

<body>

<!--══════════════════════════════
HEADER
══════════════════════════════-->

<div class="header">

  <div class="header-left">
    <h1>Mon <em>Coach</em> 🍑</h1>
    <p id="header-date"></p>
  </div>

</div>

<!--══════════════════════════════
TIMER
══════════════════════════════-->

<div class="timer-overlay" id="timer-overlay">

  <div class="timer-title">
    Temps de repos
  </div>

  <div class="timer-sub" id="timer-exercise-name">
    Hip Thrust
  </div>

  <div class="timer-circle">
    <div class="timer-num" id="timer-display">90</div>
    <div class="timer-label">secondes</div>
  </div>

  <button class="timer-btn" id="timer-btn">
    ▶ Démarrer
  </button>

  <div class="timer-skip" onclick="closeTimer()">
    Passer ✕
  </div>

</div>

<!--══════════════════════════════
PAGE NUTRITION
══════════════════════════════-->

<div class="page active" id="page-nutrition">

  <div id="today-banner"></div>

  <div class="section-title">
    <h3>Plan <em>Nutrition</em></h3>
    <div class="section-line"></div>
  </div>

  <div class="day-selector" id="nutrition-days"></div>

  <div id="nutrition-content"></div>

</div>

<!--══════════════════════════════
PAGE SPORT
══════════════════════════════-->

<div class="page" id="page-sport">

  <div class="section-title" style="padding-top:20px;">
    <h3>Séances <em>Sport</em></h3>
    <div class="section-line"></div>
  </div>

  <div id="sport-progress"></div>

  <div id="sport-content"></div>

</div>

<!--══════════════════════════════
PAGE PERFS
══════════════════════════════-->

<div class="page" id="page-perf">

  <div class="perf-header">
    <h2>Mes <em>Perfs</em></h2>

    <button class="add-btn">
      + Ajouter
    </button>
  </div>

</div>

<!--══════════════════════════════
BOTTOM NAV
══════════════════════════════-->

<div class="bottom-nav">

  <div class="nav-item active" onclick="showPage('nutrition',this)">
    <span class="nav-icon">🥗</span>
    <span class="nav-label">Nutrition</span>
  </div>

  <div class="nav-item" onclick="showPage('sport',this)">
    <span class="nav-icon">💪</span>
    <span class="nav-label">Sport</span>
  </div>

  <div class="nav-item" onclick="showPage('perf',this)">
    <span class="nav-icon">📊</span>
    <span class="nav-label">Perfs</span>
  </div>

</div>

<script>

/*══════════════════════════════
DATA
══════════════════════════════*/

const DAYS = [
  'Dimanche',
  'Lundi',
  'Mardi',
  'Mercredi',
  'Jeudi',
  'Vendredi',
  'Samedi'
];

const DAYS_SHORT = [
  'Dim',
  'Lun',
  'Mar',
  'Mer',
  'Jeu',
  'Ven',
  'Sam'
];

/*══════════════════════════════
STATE
══════════════════════════════*/

let selectedNutritionDay =
  Number(localStorage.getItem('selectedNutritionDay'))
  || new Date().getDay();

let activePage =
  localStorage.getItem('activePage')
  || 'nutrition';

let completedExercises =
  JSON.parse(localStorage.getItem('completedExercises') || '{}');

/*══════════════════════════════
NUTRITION
══════════════════════════════*/

const nutrition = {
  1:{
    label:'Jour de séance 💪',
    kcal:1620,
    prot:123,
    meals:[
      {
        icon:'🌅',
        name:'Petit-déjeuner',
        recipe:'Overnight oats Nutella',
        kcal:450,
        prot:30,
        items:[
          'Flocons d’avoine — 40g',
          'Skyr nature — 150g',
          'Banane — 1/2'
        ],
        tip:'Prépare la veille.'
      }
    ]
  }
};

/*══════════════════════════════
SPORT
══════════════════════════════*/

const sport = [
  {
    day:1,
    name:'Lundi',
    label:'Fessiers & Quads',
    icon:'🍑',

    exercises:[
      {
        name:'Hip Thrust',
        sets:'4×8',
        charge:'45–50 kg',
        rest:'2 min',
        tips:[
          'Pause en haut',
          'Pousser avec les talons'
        ]
      },

      {
        name:'Sumo Squat',
        sets:'4×10',
        charge:'24–26 kg',
        rest:'90 sec',
        tips:[
          'Pieds ouverts',
          'Contrôle lent'
        ]
      }
    ]
  }
];

/*══════════════════════════════
INIT
══════════════════════════════*/

document.addEventListener('DOMContentLoaded',()=>{

  setHeaderDate();

  renderTodayBanner();

  renderNutritionDays();

  renderNutritionContent(selectedNutritionDay);

  renderSport();

  restorePage();

});

/*══════════════════════════════
HEADER DATE
══════════════════════════════*/

function setHeaderDate(){

  const now = new Date();

  const date = now.toLocaleDateString(
    'fr-FR',
    {
      weekday:'long',
      day:'numeric',
      month:'long'
    }
  );

  document.getElementById('header-date').textContent =
    `Phase Galbe · ${date}`;
}

/*══════════════════════════════
NAVIGATION
══════════════════════════════*/

function showPage(id,el){

  document.querySelectorAll('.page')
    .forEach(p=>p.classList.remove('active'));

  document.querySelectorAll('.nav-item')
    .forEach(n=>n.classList.remove('active'));

  document.getElementById('page-'+id)
    .classList.add('active');

  el.classList.add('active');

  localStorage.setItem('activePage',id);
}

function restorePage(){

  const navItems = document.querySelectorAll('.nav-item');

  navItems.forEach(nav=>{

    const label =
      nav.querySelector('.nav-label')
      .textContent
      .toLowerCase();

    if(label.includes(activePage)){
      nav.click();
    }

  });
}

/*══════════════════════════════
TODAY BANNER
══════════════════════════════*/

function renderTodayBanner(){

  const today = new Date().getDay();

  const data = nutrition[today];

  if(!data) return;

  document.getElementById('today-banner').innerHTML = `
    <div class="today-banner">

      <div class="today-banner-left">
        <h2>${DAYS[today]}</h2>
        <p>${data.label}</p>
      </div>

      <div class="today-banner-right">
        <div class="kcal">${data.kcal}</div>
        <div class="kcal-label">
          kcal · ${data.prot}g prot
        </div>
      </div>

    </div>
  `;
}

/*══════════════════════════════
NUTRITION DAYS
══════════════════════════════*/

function renderNutritionDays(){

  const now = new Date();

  const today = now.getDay();

  const order = [1,2,3,4,5,6,0];

  const container =
    document.getElementById('nutrition-days');

  container.innerHTML = order.map(day=>{

    const diff = day - today;

    const d = new Date(now);

    d.setDate(now.getDate()+diff);

    return `
      <div
        class="day-btn ${selectedNutritionDay===day ? 'active':''}"
        onclick="selectNutritionDay(${day})"
      >

        <div class="day-short">
          ${DAYS_SHORT[day]}
        </div>

        <div class="day-num">
          ${d.getDate()}
        </div>

      </div>
    `;

  }).join('');
}

function selectNutritionDay(day){

  selectedNutritionDay = day;

  localStorage.setItem(
    'selectedNutritionDay',
    day
  );

  renderNutritionDays();

  renderNutritionContent(day);
}

/*══════════════════════════════
NUTRITION CONTENT
══════════════════════════════*/

function renderNutritionContent(day){

  const data = nutrition[day];

  if(!data) return;

  const container =
    document.getElementById('nutrition-content');

  container.innerHTML =
    data.meals.map((meal,index)=>{

      const id = `${day}_${index}`;

      return `
        <div class="meal-card">

          <div
            class="meal-card-header"
            onclick="toggleMeal('${id}')"
          >

            <span class="meal-icon">
              ${meal.icon}
            </span>

            <div class="meal-title-wrap">

              <div class="meal-name">
                ${meal.name}
              </div>

              <div class="meal-recipe-name">
                ${meal.recipe}
              </div>

            </div>

            <div class="meal-badges">

              <span class="badge badge-k">
                ${meal.kcal}
              </span>

              <span class="badge badge-p">
                ${meal.prot}g
              </span>

            </div>

            <span
              class="meal-toggle"
              id="toggle-${id}"
            >
              ▼
            </span>

          </div>

          <div
            class="meal-body"
            id="meal-${id}"
          >

            <div class="meal-divider"></div>

            ${meal.items.map(item=>{

              const parts = item.split(' — ');

              return `
                <div class="meal-item">
                  <strong>${parts[0]}</strong>
                  ${parts[1] ? ' — '+parts[1] : ''}
                </div>
              `;

            }).join('')}

            ${
              meal.tip
              ?
              `<div class="meal-tip">${meal.tip}</div>`
              :
              ''
            }

          </div>

        </div>
      `;

    }).join('');
}

function toggleMeal(id){

  document.getElementById('meal-'+id)
    .classList.toggle('open');

  document.getElementById('toggle-'+id)
    .classList.toggle('open');
}

/*══════════════════════════════
SPORT
══════════════════════════════*/

function renderSport(){

  const container =
    document.getElementById('sport-content');

  container.innerHTML =
    sport.map((s,dayIndex)=>{

      const completed =
        s.exercises.filter((_,i)=>
          completedExercises[`${dayIndex}_${i}`]
        ).length;

      return `

        <div class="sport-day-card">

          <div
            class="sport-day-header"
            onclick="toggleSport('${dayIndex}')"
          >

            <span class="sport-day-icon">
              ${s.icon}
            </span>

            <div class="sport-day-info">

              <div class="sport-day-name">
                ${s.name}
                <em>— ${s.label}</em>
              </div>

              <div class="sport-day-sub">
                ${completed}/${s.exercises.length}
                exercices terminés
              </div>

            </div>

            <span
              class="sport-day-toggle"
              id="sport-toggle-${dayIndex}"
            >
              ▼
            </span>

          </div>

          <div
            class="sport-day-body"
            id="sport-body-${dayIndex}"
          >

            ${s.exercises.map((ex,i)=>{

              const key = `${dayIndex}_${i}`;

              return `
                <div class="exercise">

                  <div class="exercise-header">

                    <div>

                      <div class="exercise-num">
                        Exercice ${i+1}
                      </div>

                      <div class="exercise-name">
                        ${ex.name}
                      </div>

                    </div>

                    <div class="exercise-sets">
                      ${ex.sets}
                    </div>

                  </div>

                  <div class="exercise-charge">
                    ⚡ ${ex.charge}
                  </div>

                  ${ex.tips.map(t=>`
                    <div class="exercise-tip">
                      ${t}
                    </div>
                  `).join('')}

                  <div
                    class="rest-tag"
                    onclick="openTimer('${ex.name}', parseRestSeconds('${ex.rest}'))"
                  >
                    ⏱ Repos ${ex.rest}
                  </div>

                  <div
                    class="exercise-check ${completedExercises[key] ? 'done':''}"
                    onclick="toggleExercise('${key}',event)"
                  >

                    <div class="exercise-check-box"></div>

                    <span>
                      Exercice terminé
                    </span>

                  </div>

                </div>
              `;

            }).join('')}

          </div>

        </div>

      `;

    }).join('');

  renderProgress();
}

function toggleSport(id){

  document.getElementById('sport-body-'+id)
    .classList.toggle('open');

  document.getElementById('sport-toggle-'+id)
    .classList.toggle('open');
}

/*══════════════════════════════
EXERCISE CHECK
══════════════════════════════*/

function toggleExercise(key,event){

  event.stopPropagation();

  completedExercises[key] =
    !completedExercises[key];

  localStorage.setItem(
    'completedExercises',
    JSON.stringify(completedExercises)
  );

  renderSport();
}

/*══════════════════════════════
PROGRESS
══════════════════════════════*/

function renderProgress(){

  const total =
    Object.keys(completedExercises).length;

  const done =
    Object.values(completedExercises)
      .filter(Boolean)
      .length;

  const percent =
    total
    ? Math.round((done/total)*100)
    : 0;

  document.getElementById('sport-progress').innerHTML = `
    <div class="progress-card">

      <div class="progress-top">

        <div class="progress-label">
          Progression de la semaine
        </div>

        <div class="progress-percent">
          ${percent}%
        </div>

      </div>

      <div class="progress-bar">
        <div
          class="progress-fill"
          style="width:${percent}%"
        ></div>
      </div>

    </div>
  `;
}

/*══════════════════════════════
TIMER
══════════════════════════════*/

let timerInterval = null;
let timerSeconds = 0;
let timerRunning = false;

function parseRestSeconds(rest){

  if(rest.includes('2 min')) return 120;

  if(rest.includes('90')) return 90;

  if(rest.includes('60')) return 60;

  return 90;
}

function openTimer(name,seconds){

  clearInterval(timerInterval);

  timerSeconds = seconds;

  timerRunning = false;

  document.getElementById('timer-exercise-name')
    .textContent = name;

  document.getElementById('timer-display')
    .textContent = seconds;

  document.getElementById('timer-btn')
    .textContent = '▶ Démarrer';

  document.getElementById('timer-overlay')
    .classList.add('open');
}

function closeTimer(){

  clearInterval(timerInterval);

  timerRunning = false;

  document.getElementById('timer-overlay')
    .classList.remove('open');
}

document.getElementById('timer-btn')
.addEventListener('click',toggleTimer);

function toggleTimer(){

  if(timerRunning){

    clearInterval(timerInterval);

    timerRunning = false;

    document.getElementById('timer-btn')
      .textContent = '▶ Reprendre';

    return;
  }

  timerRunning = true;

  document.getElementById('timer-btn')
    .textContent = '⏸ Pause';

  timerInterval = setInterval(()=>{

    timerSeconds--;

    document.getElementById('timer-display')
      .textContent = timerSeconds;

    if(timerSeconds <= 0){

      clearInterval(timerInterval);

      timerRunning = false;

      document.getElementById('timer-btn')
        .textContent = '✓ Terminé';

      if(navigator.vibrate){
        navigator.vibrate([200,100,200]);
      }
    }

  },1000);
}

</script>
